// ── SVG setup ──
const mapEl = document.getElementById('map');
let W = mapEl.clientWidth, H = mapEl.clientHeight;

const svg = d3.select('#map').append('svg')
  .attr('width', W).attr('height', H);

// SVG defs: glow filter + ocean gradient
const defs = svg.append('defs');

// Glow
const glow = defs.append('filter').attr('id','glow')

glow.append('feGaussianBlur').attr('in','SourceGraphic')
  .attr('stdDeviation','3').attr('result','blur');
const fm = glow.append('feMerge');
fm.append('feMergeNode').attr('in','blur');
fm.append('feMergeNode').attr('in','SourceGraphic');

// Subtle country highlight filter
const hf = defs.append('filter').attr('id','hf')
  .attr('x','-10%').attr('y','-10%').attr('width','120%').attr('height','120%');
hf.append('feGaussianBlur').attr('in','SourceGraphic')
  .attr('stdDeviation','1.5').attr('result','blur');
const hfm = hf.append('feMerge');
hfm.append('feMergeNode').attr('in','blur');
hfm.append('feMergeNode').attr('in','SourceGraphic');

// Ocean radial gradient
const oceanGrad = defs.append('radialGradient').attr('id','ocean')
  .attr('cx','50%').attr('cy','50%').attr('r','50%');
oceanGrad.append('stop').attr('offset','0%').attr('stop-color','#0a0f18');
oceanGrad.append('stop').attr('offset','100%').attr('stop-color','#020305');

const g = svg.append('g');

// ── Projection ──
function makeProj() {
  return d3.geoNaturalEarth1()
    .scale(W / 6.1)
    .translate([W / 2, H / 2]);
}
let proj = makeProj();
let pathGen = d3.geoPath().projection(proj);

// Ocean sphere
g.append('path').datum({type:'Sphere'})
  .attr('class','sphere')
  .attr('fill','url(#ocean)');

// Graticule
g.append('path').datum(d3.geoGraticule()())
  .attr('class','graticule')
  .attr('fill','none')
  .attr('stroke','rgba(255,255,255,0.028)')
  .attr('stroke-width',0.5);

// ── Load world ──
let selectedEl = null;
const tt = document.getElementById('tt');

d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json').then(world => {
  const features = topojson.feature(world, world.objects.countries).features;
  const borders  = topojson.mesh(world, world.objects.countries, (a,b) => a !== b);

  // Country fills
  g.selectAll('.cty')
    .data(features)
    .join('path')
    .attr('class','cty')
    .attr('fill', d => {
      const c = CM[N2A[+d.id]];
      return c ? riskScale(c.risk) : '#141414';
    })
    .attr('stroke','none')
    .on('mouseover', function(ev, d) {
      const c = CM[N2A[+d.id]];
      if (!c || this === selectedEl) return;
      d3.select(this).raise()
        .transition().duration(120)
        .attr('stroke','rgba(255,255,255,.22)')
        .attr('stroke-width', 0.8);
      showTT(ev, c);
    })
    .on('mousemove', moveTT)
    .on('mouseout', function(ev, d) {
      if (this === selectedEl) return;
      d3.select(this)
        .transition().duration(200)
        .attr('stroke','none')
        .attr('stroke-width', 0);
      hideTT();
    })
    .on('click', function(ev, d) {
      const iso3 = N2A[+d.id];
      const c = CM[iso3];
      if (!c) return;
      ev.stopPropagation();
      // Deselect previous
      if (selectedEl && selectedEl !== this) {
        d3.select(selectedEl)
          .transition().duration(300)
          .attr('stroke','none').attr('filter',null).attr('stroke-width',0);
      }
      selectedEl = this;
      d3.select(this).raise()
        .transition().duration(200)
        .attr('stroke','#33E29A')
        .attr('stroke-width', 2)
        .attr('filter','url(#hf)');
      hideTT();
      // Zoom to country centroid
      zoomTo(d);
      updateDetail(iso3, c);
    });

  // Country borders layer (drawn on top, pointer-events:none)
  g.append('path').datum(borders)
    .attr('class','borders')
    .attr('fill','none')
    .attr('stroke','rgba(255,255,255,.09)')
    .attr('stroke-width',0.35)
    .attr('pointer-events','none');

  // Sphere outline
  g.append('path').datum({type:'Sphere'})
    .attr('fill','none')
    .attr('stroke','rgba(255,255,255,.12)')
    .attr('stroke-width',0.8)
    .attr('pointer-events','none');

  renderPaths();
});

function renderPaths() {
  g.selectAll('path').attr('d', pathGen);
}

// ── Zoom ──
const zoom = d3.zoom()
  .scaleExtent([1, 12])
  .translateExtent([[0,0],[W,H]])
  .on('zoom', ev => {
    g.attr('transform', ev.transform);
    // Keep borders crisp at zoom
    const k = ev.transform.k;
    g.selectAll('.borders').attr('stroke-width', 0.35 / k);
    g.selectAll('.graticule').attr('stroke-width', 0.5 / k);
    if (selectedEl) d3.select(selectedEl).attr('stroke-width', 1.8 / k);
  });
svg.call(zoom);

// Click on ocean to deselect
svg.on('click', () => {
  if (selectedEl) {
    d3.select(selectedEl).attr('stroke','none').attr('filter',null);
    selectedEl = null;
  }
});

// ── Resize ──
new ResizeObserver(() => {
  W = mapEl.clientWidth; H = mapEl.clientHeight;
  svg.attr('width', W).attr('height', H);
  proj = makeProj();
  pathGen = d3.geoPath().projection(proj);
  renderPaths();
  zoom.translateExtent([[0,0],[W,H]]);
}).observe(mapEl);

// ── Zoom to country ──
function zoomTo(d) {
  const [[x0,y0],[x1,y1]] = pathGen.bounds(d);
  const dx = x1 - x0, dy = y1 - y0;
  const cx = (x0 + x1) / 2, cy = (y0 + y1) / 2;
  const scale = Math.min(8, 0.82 / Math.max(dx / W, dy / H));
  const tx = W / 2 - scale * cx, ty = H / 2 - scale * cy;
  svg.transition().duration(650).ease(d3.easeCubicInOut)
    .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

// ── Tooltip ──
function showTT(ev, c) {
  const rc = 'b' + c.risk;
  const gColor = c.growth && c.growth.startsWith('+') ? '#33E29A' : (c.growth && c.growth.startsWith('-') ? '#ef4444' : '#eaeaea');
  const flag = flagEmoji(c.iso3 || '');
  tt.innerHTML = `
    <div class="tt-name">${flag}</span> ${c.name}</div>
    <div class="tt-row"><span class="badge ${rc}">${c.risk}/10 — ${c.label}</span></div>
    <div class="tt-sep"></div>
    <div class="tt-row">GDP <span class="tt-val">${c.gdp}</span> &nbsp;//&nbsp; Debt/GDP <span class="tt-val">${c.debt}</span></div>
    <div class="tt-row">2025 Growth <span class="tt-val" style="color:${gColor}">${c.growth}</span></div>
    <div class="tt-row">ETF <span class="tt-val">${c.etf}</span></div>
    <div class="tt-sep"></div>
    <div class="tt-row">Exchange <span class="tt-val" style="color:#E9B86E">${c.exname}</span></div>
    <div class="tt-row">${c.idxTicker} <span class="tt-val">${c.idxPrice}</span></div>
    <div class="tt-row">Day <span class="tt-val" style="color:${c.idxDay&&c.idxDay.startsWith('+')?'#33E29A':c.idxDay&&c.idxDay.startsWith('-')?'#ef4444':'#eaeaea'}">${c.idxDay}</span> &nbsp;//&nbsp; YTD <span class="tt-val" style="color:${c.idxYtd&&c.idxYtd.startsWith('+')?'#33E29A':c.idxYtd&&c.idxYtd.startsWith('-')?'#ef4444':'#eaeaea'}">${c.idxYtd}</span></div>
  `;
  tt.style.display = 'block';
  moveTT(ev);
}
function moveTT(ev) {
  let x = ev.clientX + 16, y = ev.clientY - 12;
  if (x + 310 > window.innerWidth)  x = ev.clientX - 316;
  if (y + 120 > window.innerHeight) y = ev.clientY - 130;
  tt.style.left = x + 'px';
  tt.style.top  = y + 'px';
}
function hideTT() { tt.style.display = 'none'; }

      <span class="val" style="font-family:'Oxygen Mono',monospace;color:#33E29A">${c.gdp}</span>
      <span class="lbl" style="margin-top:.32rem">2025 Growth Est.</span>
      <span class="val" style="font-family:'Oxygen Mono',monospace;color:${c.growth&&c.growth.startsWith('+')?'#33E29A':c.growth&&c.growth.startsWith('-')?'#ef4444':'#B6B6B6'}">${c.growth}</span>
      <span class="lbl" style="margin-top:.32rem">Debt / GDP</span>
      <span class="val" style="font-family:'Oxygen Mono',monospace;color:#E9B86E">${c.debt}</span>
    </div>
    <div class="d-block">
      <span class="lbl">iShares ETF</span>
      <span class="val" style="font-family:'Oxygen Mono',monospace;color:#33E29A;font-size:.84rem">${c.etf}</span>
    </div>
    <div class="d-block">
      <span class="lbl">Stock Exchange</span>
      <span class="val" style="color:#E9B86E;font-size:.82rem">${c.exname}</span>
      <span class="lbl" style="margin-top:.32rem">Index</span>
      <span class="val" style="font-family:'Oxygen Mono',monospace;color:#eaeaea;font-size:.82rem">${c.idxTicker}</span>
      <span class="lbl" style="margin-top:.32rem">Price</span>
      <span class="val" style="font-family:'Oxygen Mono',monospace;color:#33E29A;font-size:.82rem">${c.idxPrice}</span>
      <span class="lbl" style="margin-top:.32rem">Day Change</span>
      <span class="val" style="font-family:'Oxygen Mono',monospace;font-size:.82rem;color:${c.idxDay&&c.idxDay.startsWith('+')?'#33E29A':c.idxDay&&c.idxDay.startsWith('-')?'#ef4444':'#B6B6B6'}">${c.idxDay}</span>
      <span class="lbl" style="margin-top:.32rem">YTD</span>
      <span class="val" style="font-family:'Oxygen Mono',monospace;font-size:.82rem;color:${c.idxYtd&&c.idxYtd.startsWith('+')?'#33E29A':c.idxYtd&&c.idxYtd.startsWith('-')?'#ef4444':'#B6B6B6'}">${c.idxYtd}</span>
    </div>
    <div class="d-block" style="max-width:360px;flex:1">
      <span class="lbl">Latest News</span>
      <span class="val" style="color:#E9B86E;font-size:.8rem;line-height:1.55">${c.news}</span>
    </div>
  `;
}
</script>
